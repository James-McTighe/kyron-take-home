services:
  # 1. Database Layer (PostgreSQL Container)
  postgres_db:
    image: postgres:15-alpine
    container_name: scribe_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_secure_password
      POSTGRES_DB: scribe_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend Layer (FastAPI)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scribe_backend_container
    volumes:
      - ./server:/app
    environment:
      - DATABASE_URL=postgresql://postgres:local_secure_password@postgres_db:5432/scribe_db
      # - OPENAI_API_KEY=${OPENAI_API_KEY} 
      - OPENAI_API_KEY="sk-test-dummy-key"
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy

  # 3. Frontend Layer (Vite + React)
  client:
    build:
      context: ./client/
      dockerfile: Dockerfile
    container_name: scribe_frontend_container
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server

  # 4. Reverse Proxy Layer
  nginx_proxy:
    image: nginx:alpine
    container_name: scribe_nginx_container
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/scribe.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server

volumes:
  postgres_data:
