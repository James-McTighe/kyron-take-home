server {
    listen 80;
    server_name localhost;

    # Dynamic Server-Sent Events (SSE) Streaming Configuration
    location /api/encounters/generate {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        # CRITICAL: Disable buffering so AI text chunks stream out in real-time
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering "no";
        proxy_read_timeout 600s;
    }

    # Standard API Routing
    location /api {
        proxy_pass http://server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend Static UI Routing
    location / {
        proxy_pass http://client:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Support Vite HMR WebSockets over the proxy network
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
